# AI Context & RAG Configuration

# What to index
indexing:
  code:
    include:
      - "core/**/*.py"
      - "api/**/*.py"
      - "database/**/*.py"
    exclude:
      - "**/__pycache__/**"
      - "**/node_modules/**"
      - "**/.venv/**"
      - "**/venv/**"
      - "**/migrations/**"
      - "**/*.pyc"
    
  documentation:
    include:
      - "project-brain/**/*.md"
      - "docs/MASTER_DOCUMENTATION_UPDATED.md"
      - "PROJECT_STATUS.md"
      - "README.md"
      - "database/COMMON_ISSUES.md"
      - "database/README.md"
    exclude:
      - "**/node_modules/**"

# Embedding settings
embeddings:
  provider: "openai"
  model: "text-embedding-3-small"
  chunk_size: 1000
  chunk_overlap: 200
  
# Update triggers
auto_update:
  on_git_commit: true
  on_file_save: false
  on_deploy: true

# RAG settings
rag:
  max_results: 10
  similarity_threshold: 0.7
  rerank: true
